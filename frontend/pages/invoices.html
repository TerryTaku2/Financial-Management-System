<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Invoices — City of Harare FMS</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/shared.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <div class="topbar">
      <span class="topbar-title">Invoice Management</span>
      <div class="topbar-right">
        <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">⬆ Import</button>
        <input type="file" id="importFile" accept=".csv,.xlsx" style="display:none" onchange="importInvoices(this)">
        <button class="btn btn-secondary" onclick="downloadExport('/api/export/invoices?format=csv','invoices.csv')">⬇ CSV</button>
        <button class="btn btn-secondary" onclick="downloadExport('/api/export/invoices?format=xlsx','invoices.xlsx')">⬇ Excel</button>
        <button class="btn btn-secondary" title="Download import template" onclick="downloadExport('/api/templates/invoices?format=xlsx','template_invoices.xlsx')">📋 Template</button>
        <button class="btn btn-secondary" onclick="exportTablePDF('Invoice Register','invTable','invoices.pdf')">⬇ PDF</button>
        <button class="btn btn-primary" onclick="openAddModal()">+ New Invoice</button>
      </div>
    </div>
    <div class="page-content">
      <div class="card">
        <div class="filter-bar">
          <input type="text" id="searchInput" placeholder="🔍  Search ratepayer name or account..." style="min-width:240px" oninput="debounceLoad()">
          <select id="statusFilter" onchange="loadInvoices()">
            <option value="">All Statuses</option>
            <option value="pending">Pending</option><option value="paid">Paid</option>
            <option value="overdue">Overdue</option><option value="disputed">Disputed</option><option value="waived">Waived</option>
          </select>
          <select id="categoryFilter" onchange="loadInvoices()">
            <option value="">All Categories</option>
            <option value="rates">rates</option><option value="water">water</option><option value="sewerage">sewerage</option>
            <option value="refuse">refuse</option><option value="licensing">licensing</option><option value="parking">parking</option><option value="rentals">rentals</option><option value="other">other</option>
          </select>
          <select id="anomalyFilter" onchange="loadInvoices()">
            <option value="">All Anomaly Levels</option>
            <option value="high">High Anomaly</option><option value="medium">Medium</option><option value="low">Low</option>
          </select>
          <span id="countBadge" style="font-size:12px;color:var(--text2);margin-left:auto"></span>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Invoice #</th><th>Ratepayer</th><th>Category</th>
              <th>Amount</th><th>Paid</th><th>Balance</th>
              <th>Due Date</th><th>Status</th><th>Anomaly</th><th>Actions</th>
            </tr></thead>
            <tbody id="invTable"><tr><td colspan="10" class="text-center text-muted" style="padding:32px">Loading...</td></tr></tbody>
          </table>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </div>
  </div>
</div>

<!-- Create Invoice Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Create Invoice</span>
      <button class="modal-close" onclick="closeModal('addModal')">×</button>
    </div>
    <div class="form-group"><label>Account Number</label><input id="f_rpacct" type="text" placeholder="e.g. COH-123456" autocomplete="off"></div>
    <div class="form-group"><label>Revenue Category</label>
      <select id="f_cat">
        <option value="rates">Rates</option><option value="water">Water</option>
        <option value="sewerage">Sewerage</option><option value="refuse">Refuse</option>
        <option value="licensing">Licensing</option><option value="parking">Parking</option>
        <option value="rentals">Rentals</option><option value="other">Other</option>
      </select>
    </div>
    <div class="grid-2">
      <div class="form-group"><label>Amount (USD)</label><input id="f_amount" type="number" step="0.01" placeholder="0.00"></div>
      <div class="form-group"><label>Due Date</label><input id="f_due" type="date"></div>
    </div>
    <div class="form-group"><label>Notes (optional)</label><textarea id="f_notes" rows="2" placeholder="Any additional notes..."></textarea></div>
    <div style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:12px;color:var(--text2);margin-bottom:4px">
      Initial status: <strong style="color:var(--warning)">Pending</strong> — automatically set to Overdue once the due date passes.
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('addModal')">Cancel</button>
      <button class="btn btn-primary" onclick="createInvoice()">Create Invoice</button>
    </div>
  </div>
</div>

<!-- Edit Invoice Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="editModalTitle">Edit Invoice</span>
      <button class="modal-close" onclick="closeModal('editModal')">×</button>
    </div>
    <input type="hidden" id="e_id">
    <div class="grid-2">
      <div class="form-group"><label>Status</label>
        <select id="e_status">
          <option value="pending">Pending</option><option value="overdue">Overdue</option>
          <option value="disputed">Disputed</option><option value="waived">Waived</option><option value="paid">Paid</option>
        </select>
      </div>
      <div class="form-group"><label>Due Date</label><input id="e_due" type="date"></div>
    </div>
    <div class="form-group"><label>Amount (USD)</label><input id="e_amount" type="number" step="0.01" placeholder="0.00"></div>
    <div class="form-group"><label>Notes</label><textarea id="e_notes" rows="2" placeholder="Notes..."></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('editModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script src="../js/shared.js"></script>
<script>
requireAuth(); buildSidebar('invoices');
let currentPage = 1;
const user = getUser();

// Set default due date
const d = new Date(); d.setDate(d.getDate()+30);
document.getElementById('f_due').value = d.toISOString().slice(0,10);

// Apply URL context on load
(function() {
  const p = getUrlParams();
  if (p.status)  document.getElementById('statusFilter').value   = p.status;
  if (p.anomaly) document.getElementById('anomalyFilter').value  = p.anomaly;
  if (p.category)document.getElementById('categoryFilter').value = p.category;
  if (p.ratepayer_id) {
    window._filterRatepayerId = parseInt(p.ratepayer_id);
    apiFetch(`/api/ratepayers/${p.ratepayer_id}`)
      .then(rp => { document.querySelector('.topbar-title').textContent = `Invoices — ${rp.account_number} (${rp.full_name})`; })
      .catch(() => {});
  }
})();

function openAddModal() { openModal('addModal'); }

let _debounceTimer = null;
function debounceLoad() {
  clearTimeout(_debounceTimer);
  _debounceTimer = setTimeout(() => loadInvoices(1), 350);
}

async function loadInvoices(page = 1) {
  currentPage = page;
  const status  = document.getElementById('statusFilter').value;
  const cat     = document.getElementById('categoryFilter').value;
  const anomaly = document.getElementById('anomalyFilter').value;
  const search  = document.getElementById('searchInput').value.trim();
  const skip    = (page-1) * 30;
  try {
    let url = `/api/invoices?skip=${skip}&limit=30`;
    if (status)  url += `&status=${status}`;
    if (cat)     url += `&category=${cat}`;
    if (anomaly) url += `&anomaly=${anomaly}`;
    if (search)  url += `&search=${encodeURIComponent(search)}`;
    if (window._filterRatepayerId) url += `&ratepayer_id=${window._filterRatepayerId}`;
    const data = await apiFetch(url);
    document.getElementById('countBadge').textContent = `${data.total} invoices`;
    const tbody = document.getElementById('invTable');
    if (data.items.length === 0) {
      tbody.innerHTML = `<tr><td colspan="10"><div class="empty-state"><div class="empty-icon">🧾</div><p>No invoices found</p></div></td></tr>`;
      return;
    }
    const canEdit = ['admin','accountant','revenue_officer'].includes(user?.role);
    tbody.innerHTML = data.items.map(inv => `
      <tr title="${inv.anomaly_reason || ''}">
        <td><code style="font-size:11.5px;color:var(--primary-light)">${inv.invoice_number}</code></td>
        <td>
          <div style="font-weight:500;font-size:13px">${inv.ratepayer_name}</div>
          <div style="font-size:11px;color:var(--text3)">${inv.account_number}</div>
        </td>
        <td><span class="badge badge-info">${inv.category}</span></td>
        <td class="fw-bold">${fmtMoney(inv.amount)}</td>
        <td class="text-success">${fmtMoney(inv.amount_paid)}</td>
        <td class="${inv.balance > 0 ? 'text-danger' : 'text-success'}">${fmtMoney(inv.balance)}</td>
        <td style="font-size:12.5px;color:var(--text2)">${fmtDate(inv.due_date)}</td>
        <td>${statusBadge(inv.status)}</td>
        <td>${anomalyBadge(inv.anomaly_flag)}</td>
        <td style="white-space:nowrap">
          ${canEdit ? `<button class="btn btn-sm btn-secondary" onclick="openEditModal(${JSON.stringify(inv).replace(/"/g,'&quot;')})">Edit</button>` : ''}
          <button class="btn btn-sm btn-secondary" onclick="printInvoice(${JSON.stringify(inv).replace(/"/g,'&quot;')})">🖨 Print</button>
          <a class="btn btn-sm btn-secondary" href="${pageUrl('payments.html',{ratepayer_id:inv.ratepayer_id})}">Payments</a>
          <button class="btn btn-sm btn-secondary" onclick="printStatement(${inv.ratepayer_id})">Statement</button>
          ${inv.balance > 0 ? `<a class="btn btn-sm btn-secondary" href="${pageUrl('aging.html',{account:inv.account_number})}">Aging</a>` : ''}
          ${canEdit && inv.amount_paid == 0 ? `<button class="btn btn-sm btn-danger" onclick="deleteInvoice(${inv.id},'${inv.invoice_number}')">Delete</button>` : ''}
        </td>
      </tr>`).join('');
    renderPagination('pagination', data.total, 30, page, 'loadInvoices');
  } catch(e) { toast(e.message, 'error'); }
}

function openEditModal(inv) {
  document.getElementById('e_id').value         = inv.id;
  document.getElementById('e_status').value     = inv.status;
  document.getElementById('e_due').value        = inv.due_date;
  document.getElementById('e_amount').value     = inv.amount;
  document.getElementById('e_notes').value      = inv.notes || '';
  document.getElementById('editModalTitle').textContent = `Edit Invoice — ${inv.invoice_number}`;
  openModal('editModal');
}

async function saveEdit() {
  const id = document.getElementById('e_id').value;
  const data = {
    status:   document.getElementById('e_status').value,
    due_date: document.getElementById('e_due').value,
    amount:   parseFloat(document.getElementById('e_amount').value),
    notes:    document.getElementById('e_notes').value,
  };
  try {
    await apiPut(`/api/invoices/${id}`, data);
    toast('Invoice updated', 'success');
    closeModal('editModal');
    loadInvoices(currentPage);
  } catch(e) { toast(e.message, 'error'); }
}

async function deleteInvoice(id, num) {
  await confirmDelete(`Delete invoice ${num}? This cannot be undone.`, async () => {
    try {
      await apiDelete(`/api/invoices/${id}`);
      toast('Invoice deleted', 'success');
      loadInvoices(currentPage);
    } catch(e) { toast(e.message, 'error'); }
  });
}

async function createInvoice() {
  const acct   = document.getElementById('f_rpacct').value.trim();
  const amount = parseFloat(document.getElementById('f_amount').value);
  const due    = document.getElementById('f_due').value;
  if (!acct || !amount || !due) { toast('Please fill all required fields', 'warning'); return; }
  try {
    const lookup = await apiFetch(`/api/ratepayers?search=${encodeURIComponent(acct)}&limit=1`);
    const rp = (lookup.items || lookup)[0];
    if (!rp) { toast(`No ratepayer found for account "${acct}"`, 'warning'); return; }
    const data = {
      ratepayer_id: rp.id,
      category:     document.getElementById('f_cat').value,
      amount,
      due_date:     due,
      notes:        document.getElementById('f_notes').value,
    };
    const res = await apiPost('/api/invoices', data);
    toast(`Invoice ${res.invoice_number} created for ${rp.full_name}`, 'success');
    closeModal('addModal');
    loadInvoices();
  } catch(e) { toast(e.message, 'error'); }
}

async function importInvoices(input) {
  const file = input.files[0];
  if (!file) return;
  try {
    const res = await uploadImport('/api/import/invoices', file);
    toast(res.message, 'success');
    if (res.errors && res.errors.length) alert(`Warnings:\n${res.errors.join('\n')}`);
    loadInvoices();
  } catch(e) { toast(e.message, 'error'); }
  input.value = '';
}

function printInvoice(inv) {
  const w = window.open('', '_blank', 'width=720,height=900');
  const statusColor = {paid:'#27ae60',pending:'#f39c12',overdue:'#e74c3c',disputed:'#8e44ad',waived:'#7f8c8d'}[inv.status] || '#333';
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>Invoice ${inv.invoice_number}</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',Arial,sans-serif;color:#222;background:#fff;padding:32px}
    .header{display:flex;align-items:center;gap:16px;border-bottom:3px solid #1f3864;padding-bottom:16px;margin-bottom:24px}
    .header img{width:60px;height:60px;object-fit:contain}
    .header-text h1{font-size:20px;color:#1f3864;font-weight:700}
    .header-text p{font-size:12px;color:#555;margin-top:2px}
    .inv-title{font-size:26px;font-weight:700;color:#1f3864;margin-bottom:4px}
    .inv-number{font-size:13px;color:#555;margin-bottom:24px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
    .box{background:#f4f7fb;border:1px solid #dde4f0;border-radius:6px;padding:14px}
    .box label{font-size:10px;text-transform:uppercase;color:#888;display:block;margin-bottom:4px}
    .box span{font-size:14px;font-weight:600;color:#222}
    table{width:100%;border-collapse:collapse;margin-bottom:24px}
    th{background:#1f3864;color:#fff;font-size:11px;padding:8px 12px;text-align:left}
    td{padding:10px 12px;border-bottom:1px solid #eee;font-size:13px}
    tr:nth-child(even) td{background:#f9fbff}
    .status-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;color:#fff;background:${statusColor}}
    .total-row td{font-weight:700;background:#eef3fb}
    .footer{border-top:1px solid #dde;padding-top:12px;font-size:11px;color:#888;text-align:center}
    @media print{body{padding:16px}.no-print{display:none}}
  </style></head><body>
  <div class="header">
    <img src="/static/images/crest.png" alt="Crest" onerror="this.style.display='none'">
    <div class="header-text">
      <h1>City of Harare</h1>
      <p>Financial Management System — Tax Invoice</p>
    </div>
  </div>
  <div class="inv-title">${inv.invoice_number}</div>
  <div class="inv-number">Issue Date: ${inv.issue_date} &nbsp;|&nbsp; Due Date: ${inv.due_date} &nbsp;|&nbsp; Status: <span class="status-badge">${inv.status.toUpperCase()}</span></div>
  <div class="grid">
    <div class="box"><label>Billed To</label><span>${inv.ratepayer_name}</span><br><span style="font-size:12px;color:#555">${inv.account_number}</span></div>
    <div class="box"><label>Category</label><span style="text-transform:capitalize">${inv.category}</span></div>
  </div>
  <table>
    <thead><tr><th>Description</th><th>Amount (USD)</th></tr></thead>
    <tbody>
      <tr><td>${inv.category.charAt(0).toUpperCase()+inv.category.slice(1)} Charges</td><td>$${Number(inv.amount).toFixed(2)}</td></tr>
    </tbody>
    <tfoot>
      <tr class="total-row"><td>Total Billed</td><td>$${Number(inv.amount).toFixed(2)}</td></tr>
      <tr class="total-row"><td>Amount Paid</td><td style="color:#27ae60">$${Number(inv.amount_paid).toFixed(2)}</td></tr>
      <tr class="total-row"><td>Balance Due</td><td style="color:${inv.balance > 0 ? '#e74c3c' : '#27ae60'}">$${Number(inv.balance).toFixed(2)}</td></tr>
    </tfoot>
  </table>
  ${inv.notes ? `<p style="font-size:12px;color:#555;margin-bottom:16px"><strong>Notes:</strong> ${inv.notes}</p>` : ''}
  <div class="footer">City of Harare FMS &nbsp;|&nbsp; Printed: ${new Date().toLocaleString('en-GB')} &nbsp;|&nbsp; Confidential</div>
  <div class="no-print" style="margin-top:20px;text-align:center">
    <button onclick="window.print()" style="padding:10px 28px;background:#1f3864;color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer">Print Invoice</button>
  </div>
  </body></html>`);
  w.document.close();
}

async function printStatement(ratepayerId) {
  try {
    const token = getToken();
    const res = await fetch(`${API}/api/ratepayers/${ratepayerId}/statement`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (!res.ok) { toast('Could not load statement', 'error'); return; }
    const html = await res.text();
    const w = window.open('', '_blank', 'width=800,height=900');
    w.document.write(html);
    w.document.close();
  } catch(e) { toast(e.message, 'error'); }
}

loadInvoices();
</script>
</body>
</html>
