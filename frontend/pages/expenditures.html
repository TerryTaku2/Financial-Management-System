<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Expenditure — City of Harare FMS</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/shared.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <div class="topbar">
      <span class="topbar-title">Expenditure Management</span>
      <div class="topbar-right">
        <button class="btn btn-secondary" onclick="downloadExport('/api/export/expenditures?format=csv','expenditures.csv')">⬇ CSV</button>
        <button class="btn btn-secondary" onclick="downloadExport('/api/export/expenditures?format=xlsx','expenditures.xlsx')">⬇ Excel</button>
        <button class="btn btn-secondary" onclick="exportTablePDF('Expenditure Register','expTable','expenditures.pdf')">⬇ PDF</button>
        <button class="btn btn-secondary" id="btnAgingLink" onclick="goToAging()" title="View creditor aging for selected department">⏳ Creditor Aging</button>
        <button class="btn btn-primary" onclick="openAddModal()">+ Record Expenditure</button>
      </div>
    </div>
    <div class="page-content">
      <div class="card">
        <div class="filter-bar">
          <select id="deptFilter" onchange="loadExp()">
            <option value="">All Departments</option>
            <option>Finance</option><option>Water &amp; Sanitation</option><option>Roads</option>
            <option>Waste Management</option><option>Health</option><option>Human Resources</option><option>ICT</option>
          </select>
          <span id="countBadge" style="font-size:12px;color:var(--text2);margin-left:auto"></span>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Reference</th><th>Department</th><th>Description</th>
              <th>Amount</th><th>Budget Line</th><th>Date</th><th>Approved</th><th>Anomaly</th><th>Actions</th>
            </tr></thead>
            <tbody id="expTable"><tr><td colspan="9" class="text-center text-muted" style="padding:32px">Loading...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Create / Edit Expenditure Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Record Expenditure</span>
      <button class="modal-close" onclick="closeModal('addModal')">×</button>
    </div>
    <input type="hidden" id="f_editId">
    <div class="form-group"><label>Department</label>
      <select id="f_dept">
        <option>Finance</option><option>Water &amp; Sanitation</option><option>Roads</option>
        <option>Waste Management</option><option>Health</option><option>Human Resources</option><option>ICT</option>
      </select>
    </div>
    <div class="form-group"><label>Description</label><textarea id="f_desc" rows="2" placeholder="Describe the expenditure..."></textarea></div>
    <div class="grid-2">
      <div class="form-group"><label>Amount (USD)</label><input id="f_amount" type="number" step="0.01" placeholder="0.00"></div>
      <div class="form-group"><label>Budget Line</label><input id="f_bl" placeholder="e.g. BL-202"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('addModal')">Cancel</button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveExp()">Submit</button>
    </div>
  </div>
</div>

<script src="../js/shared.js"></script>
<script>
requireAuth(); buildSidebar('expenditures');
const user = getUser();
const canApprove = ['admin','accountant'].includes(user?.role);
const canDelete  = ['admin','accountant'].includes(user?.role);

// Apply URL context on load (?department= pre-filters the dropdown)
(function() {
  const p = getUrlParams();
  if (p.department) {
    document.getElementById('deptFilter').value = p.department;
    document.querySelector('.topbar-title').textContent = 'Expenditures — ' + p.department;
  }
})();

function goToAging() {
  const dept = document.getElementById('deptFilter').value;
  navigateTo('aging.html', dept ? { department: dept } : {});
}

function openAddModal() {
  document.getElementById('f_editId').value = '';
  document.getElementById('modalTitle').textContent = 'Record Expenditure';
  document.getElementById('saveBtn').textContent = 'Submit';
  ['f_desc','f_amount','f_bl'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f_dept').value = 'Finance';
  openModal('addModal');
}

function openEditModal(e) {
  document.getElementById('f_editId').value  = e.id;
  document.getElementById('modalTitle').textContent = 'Edit Expenditure';
  document.getElementById('saveBtn').textContent = 'Save Changes';
  document.getElementById('f_dept').value    = e.department;
  document.getElementById('f_desc').value    = e.description;
  document.getElementById('f_amount').value  = e.amount;
  document.getElementById('f_bl').value      = e.budget_line;
  openModal('addModal');
}

async function loadExp() {
  const dept = document.getElementById('deptFilter').value;
  try {
    let url = '/api/expenditures?limit=200';
    if (dept) url += `&department=${encodeURIComponent(dept)}`;
    const data = await apiFetch(url);
    const items = data.items || data;
    document.getElementById('countBadge').textContent = `${data.total || items.length} expenditures`;
    const tbody = document.getElementById('expTable');
    if (!items.length) {
      tbody.innerHTML = `<tr><td colspan="9"><div class="empty-state"><div class="empty-icon">💸</div><p>No expenditures</p></div></td></tr>`;
      return;
    }
    tbody.innerHTML = items.map(e => `<tr>
      <td><code style="font-size:11.5px;color:var(--gold)">${e.reference_number}</code></td>
      <td>${e.department}</td>
      <td style="color:var(--text2);font-size:12.5px;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${e.description}">${e.description}</td>
      <td class="fw-bold">${fmtMoney(e.amount)}</td>
      <td style="font-size:12px">${e.budget_line}</td>
      <td style="font-size:12.5px;color:var(--text2)">${fmtDate(e.date)}</td>
      <td>${e.is_approved ? '<span class="badge badge-paid">Approved</span>' : '<span class="badge badge-pending">Pending</span>'}</td>
      <td>${anomalyBadge(e.anomaly_flag)}</td>
      <td style="white-space:nowrap">
        ${!e.is_approved && canApprove ? `<button class="btn btn-sm btn-primary" onclick="approveExp(${e.id})">Approve</button>` : ''}
        ${!e.is_approved ? `<button class="btn btn-sm btn-secondary" onclick="openEditModal(${JSON.stringify(e).replace(/"/g,'&quot;')})">Edit</button>` : ''}
        <a class="btn btn-sm btn-secondary" href="${pageUrl('aging.html',{department:e.department})}">Aging</a>
        ${!e.is_approved && canDelete ? `<button class="btn btn-sm btn-danger" onclick="deleteExp(${e.id},'${e.reference_number}')">Delete</button>` : ''}
      </td>
    </tr>`).join('');
  } catch(e) { toast(e.message,'error'); }
}

async function approveExp(id) {
  try { await apiPatch(`/api/expenditures/${id}/approve`); toast('Expenditure approved','success'); loadExp(); }
  catch(e) { toast(e.message,'error'); }
}

async function deleteExp(id, ref) {
  await confirmDelete(`Delete expenditure ${ref}? This cannot be undone.`, async () => {
    try { await apiDelete(`/api/expenditures/${id}`); toast('Expenditure deleted','success'); loadExp(); }
    catch(e) { toast(e.message,'error'); }
  });
}

async function saveExp() {
  const editId = document.getElementById('f_editId').value;
  const data = {
    department:  document.getElementById('f_dept').value,
    description: document.getElementById('f_desc').value,
    amount:      parseFloat(document.getElementById('f_amount').value),
    budget_line: document.getElementById('f_bl').value
  };
  if (!data.description || !data.amount) { toast('Description and amount required','warning'); return; }
  try {
    if (editId) {
      await apiPut(`/api/expenditures/${editId}`, data);
      toast('Expenditure updated','success');
    } else {
      await apiPost('/api/expenditures', data);
      toast('Expenditure recorded','success');
    }
    closeModal('addModal');
    loadExp();
  } catch(e) { toast(e.message,'error'); }
}

loadExp();
</script>
</body>
</html>
