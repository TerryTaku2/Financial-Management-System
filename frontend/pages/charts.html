<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chart Generator — City of Harare FMS</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/shared.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ── Layout ────────────────────────────────────────────────────── */
.cg-layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 16px;
  height: calc(100vh - 64px);
  padding: 16px;
  box-sizing: border-box;
  overflow: hidden;
}
/* ── Control panel ─────────────────────────────────────────────── */
.cg-panel {
  display: flex;
  flex-direction: column;
  gap: 12px;
  overflow-y: auto;
  padding-right: 4px;
}
.cg-section {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
}
.cg-section-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--text2);
  margin-bottom: 10px;
}
/* ── Preset grid ───────────────────────────────────────────────── */
.preset-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.preset-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 6px;
  cursor: pointer;
  text-align: center;
  font-size: 11px;
  color: var(--text1);
  transition: all .15s;
  line-height: 1.3;
}
.preset-btn:hover { background: rgba(59,125,216,.15); border-color: var(--primary); color: var(--primary); }
.preset-btn.active { background: rgba(59,125,216,.2); border-color: var(--primary); color: var(--primary); font-weight: 600; }
.preset-icon { font-size: 18px; display: block; margin-bottom: 3px; }
/* ── Type pills ────────────────────────────────────────────────── */
.type-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}
.type-pill {
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  font-size: 11px;
  cursor: pointer;
  background: var(--bg3);
  color: var(--text1);
  transition: all .15s;
}
.type-pill:hover { border-color: var(--primary); color: var(--primary); }
.type-pill.active { background: var(--primary); color: #fff; border-color: var(--primary); }
/* ── Color swatches ────────────────────────────────────────────── */
.scheme-grid {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.scheme-btn {
  width: 32px; height: 22px;
  border-radius: 6px;
  border: 2px solid transparent;
  cursor: pointer;
  transition: all .15s;
}
.scheme-btn:hover, .scheme-btn.active { border-color: var(--text1); transform: scale(1.1); }
/* ── Options ────────────────────────────────────────────────────── */
.opt-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text1);
  margin-bottom: 5px;
  cursor: pointer;
}
.opt-row input[type=checkbox] { accent-color: var(--primary); width: 14px; height: 14px; }
.opt-row input[type=range] { flex: 1; accent-color: var(--primary); }
/* ── Main chart area ───────────────────────────────────────────── */
.cg-main {
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 0;
}
.cg-chart-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 16px;
}
.cg-chart-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text1);
}
.cg-chart-sub {
  font-size: 11px;
  color: var(--text2);
  margin-top: 2px;
}
.cg-chart-actions { display: flex; gap: 6px; align-items: center; }
.cg-canvas-wrap {
  flex: 1;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
  position: relative;
  min-height: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.cg-canvas-wrap canvas { max-height: 100%; max-width: 100%; }
.cg-empty {
  text-align: center;
  color: var(--text2);
  font-size: 13px;
}
.cg-empty-icon { font-size: 48px; margin-bottom: 12px; opacity: .4; }
.cg-loading {
  position: absolute;
  inset: 0;
  background: rgba(16,22,36,.7);
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  font-size: 14px;
  color: var(--text1);
  display: none;
}
.cg-stat-bar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.cg-stat {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 11px;
}
.cg-stat-val { font-size: 16px; font-weight: 700; color: var(--primary); }
.cg-stat-lbl { color: var(--text2); margin-top: 1px; }
/* ── Fullscreen ─────────────────────────────────────────────────── */
.fullscreen-overlay {
  position: fixed;
  inset: 0;
  background: #0d1322;
  z-index: 9999;
  display: none;
  flex-direction: column;
  padding: 20px;
  box-sizing: border-box;
}
.fullscreen-overlay.open { display: flex; }
.fullscreen-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.fullscreen-title { font-size: 18px; font-weight: 700; color: #fff; }
.fullscreen-canvas-wrap { flex: 1; display: flex; align-items: center; justify-content: center; }
.fullscreen-canvas-wrap canvas { max-height: 100%; max-width: 100%; }
/* ── Responsive ─────────────────────────────────────────────────── */
@media (max-width: 900px) {
  .cg-layout { grid-template-columns: 1fr; grid-template-rows: auto 1fr; height: auto; overflow: visible; }
  .cg-panel { max-height: 40vh; }
}
</style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">

    <div class="topbar">
      <span class="topbar-title">📊 Chart Generator</span>
      <div class="topbar-right">
        <button class="btn btn-secondary btn-sm" id="btnPNG"  onclick="downloadChartAsPNG('mainChart', currentTitle.replace(/ /g,'_')+'.png')" disabled>⬇ PNG</button>
        <button class="btn btn-secondary btn-sm" id="btnPDF"  onclick="exportChartAsPDF('mainChart', currentTitle, currentTitle.replace(/ /g,'_')+'.pdf', currentSubtitle)" disabled>⬇ PDF</button>
        <button class="btn btn-secondary btn-sm" id="btnFull" onclick="openFullscreen()" disabled>⛶ Fullscreen</button>
      </div>
    </div>

    <div class="cg-layout">

      <!-- ── Control Panel ──────────────────────────────────── -->
      <div class="cg-panel">

        <!-- Presets -->
        <div class="cg-section">
          <div class="cg-section-title">Quick Charts</div>
          <div class="preset-grid" id="presetGrid"></div>
        </div>

        <!-- Chart Type -->
        <div class="cg-section">
          <div class="cg-section-title">Chart Type</div>
          <div class="type-pills" id="typePills">
            <button class="type-pill active" data-type="bar"      onclick="setType('bar',this)">Bar</button>
            <button class="type-pill"        data-type="line"     onclick="setType('line',this)">Line</button>
            <button class="type-pill"        data-type="pie"      onclick="setType('pie',this)">Pie</button>
            <button class="type-pill"        data-type="doughnut" onclick="setType('doughnut',this)">Doughnut</button>
            <button class="type-pill"        data-type="radar"    onclick="setType('radar',this)">Radar</button>
            <button class="type-pill"        data-type="polarArea" onclick="setType('polarArea',this)">Polar</button>
          </div>
        </div>

        <!-- Color Scheme -->
        <div class="cg-section">
          <div class="cg-section-title">Color Scheme</div>
          <div class="scheme-grid" id="schemeGrid"></div>
        </div>

        <!-- Options -->
        <div class="cg-section">
          <div class="cg-section-title">Options</div>
          <label class="opt-row"><input type="checkbox" id="optLegend" checked onchange="redraw()"> Show Legend</label>
          <label class="opt-row"><input type="checkbox" id="optGrid"   checked onchange="redraw()"> Show Grid Lines</label>
          <label class="opt-row"><input type="checkbox" id="optValues"       onchange="redraw()"> Show Values on Chart</label>
          <label class="opt-row"><input type="checkbox" id="optSmooth" checked onchange="redraw()"> Smooth Lines</label>
          <label class="opt-row" style="margin-top:6px">
            <span style="white-space:nowrap;min-width:80px">Bar Width</span>
            <input type="range" id="optBarWidth" min="0.3" max="1" step="0.05" value="0.7" onchange="redraw()">
          </label>
        </div>

      </div>

      <!-- ── Chart Main Area ────────────────────────────────── -->
      <div class="cg-main">

        <div class="cg-chart-header">
          <div>
            <div class="cg-chart-title" id="chartTitle">Select a chart from the Quick Charts panel</div>
            <div class="cg-chart-sub"   id="chartSub">Choose a preset to load data, then customise the type and colours.</div>
          </div>
          <div class="cg-chart-actions">
            <span id="chartGenAt" style="font-size:11px;color:var(--text2)"></span>
          </div>
        </div>

        <div id="statBar" class="cg-stat-bar" style="display:none"></div>

        <div class="cg-canvas-wrap" id="canvasWrap">
          <div class="cg-empty" id="chartEmpty">
            <div class="cg-empty-icon">📊</div>
            <div>Select a chart preset to get started</div>
            <div style="margin-top:6px;font-size:11px">Charts can be exported as PNG or PDF using the buttons above</div>
          </div>
          <canvas id="mainChart" style="display:none; max-height:420px"></canvas>
          <div class="cg-loading" id="chartLoading">⏳ Loading data...</div>
        </div>

      </div>
    </div>

    <!-- ── Fullscreen Overlay ──────────────────────────────────── -->
    <div class="fullscreen-overlay" id="fullscreenOverlay">
      <div class="fullscreen-header">
        <span class="fullscreen-title" id="fsTitle"></span>
        <div style="display:flex;gap:8px">
          <button class="btn btn-secondary btn-sm" onclick="downloadChartAsPNG('fsChart','chart_fullscreen.png')">⬇ PNG</button>
          <button class="btn btn-secondary btn-sm" onclick="exportChartAsPDF('fsChart', currentTitle,'chart_fullscreen.pdf')">⬇ PDF</button>
          <button class="btn btn-primary btn-sm"   onclick="closeFullscreen()">✕ Close</button>
        </div>
      </div>
      <div class="fullscreen-canvas-wrap">
        <canvas id="fsChart"></canvas>
      </div>
    </div>

  </div>
</div>

<script src="../js/shared.js"></script>
<script>
requireAuth();
buildSidebar('charts');
Chart.defaults.color = '#8892a4';
Chart.defaults.borderColor = '#2a3347';

// ── State ─────────────────────────────────────────────────────────────────────
let currentChart   = null;
let fsChart        = null;
let currentData    = null; // { labels, datasets }
let currentType    = 'bar';
let currentScheme  = 0;
let currentTitle   = 'Chart';
let currentSubtitle = '';
let currentPreset  = null;

// ── Color Schemes ─────────────────────────────────────────────────────────────
const SCHEMES = [
  {
    name: 'COH Official',
    swatch: 'linear-gradient(135deg,#1F3864,#2E5FA3,#27ae60)',
    colors: ['#2E5FA3','#27ae60','#f39c12','#e74c3c','#9b59b6','#1abc9c','#e67e22','#3498db','#e91e63','#00bcd4']
  },
  {
    name: 'Blue Ocean',
    swatch: 'linear-gradient(135deg,#0077b6,#48cae4,#90e0ef)',
    colors: ['#0077b6','#0096c7','#00b4d8','#48cae4','#90e0ef','#ade8f4','#caf0f8','#023e8a','#03045e','#0096c7']
  },
  {
    name: 'Warm Tones',
    swatch: 'linear-gradient(135deg,#d62828,#f77f00,#fcbf49)',
    colors: ['#d62828','#f77f00','#fcbf49','#eae2b7','#c77dff','#9d4edd','#7b2d8b','#e63946','#ff6b6b','#ffd166']
  },
  {
    name: 'Nature Green',
    swatch: 'linear-gradient(135deg,#1b4332,#40916c,#b7e4c7)',
    colors: ['#1b4332','#2d6a4f','#40916c','#52b788','#74c69d','#95d5b2','#b7e4c7','#27ae60','#16a085','#117a65']
  },
  {
    name: 'Sunset',
    swatch: 'linear-gradient(135deg,#ff6b6b,#feca57,#ff9ff3)',
    colors: ['#ff6b6b','#feca57','#48dbfb','#ff9ff3','#54a0ff','#5f27cd','#00d2d3','#ff9f43','#ee5a24','#0abde3']
  }
];

// ── Presets ───────────────────────────────────────────────────────────────────
const PRESETS = [
  {
    id: 'revenue-category',
    icon: '💰', label: 'Revenue\nby Category',
    title: 'Revenue by Category',
    sub: 'Total billed vs collected per revenue stream',
    defaultType: 'bar',
    allowedTypes: ['bar','pie','doughnut','radar','polarArea'],
    load: async () => {
      const d = await apiFetch('/api/dashboard/revenue-by-category');
      return {
        labels: d.map(r => r.category),
        datasets: [
          { label: 'Billed',    data: d.map(r => r.billed)    },
          { label: 'Collected', data: d.map(r => r.collected)  }
        ],
        stats: [
          { val: fmtMoney(d.reduce((s,r)=>s+r.billed,0)),    lbl: 'Total Billed' },
          { val: fmtMoney(d.reduce((s,r)=>s+r.collected,0)), lbl: 'Total Collected' },
          { val: d.length + ' cats',                         lbl: 'Categories' }
        ]
      };
    }
  },
  {
    id: 'monthly-trend',
    icon: '📈', label: 'Monthly\nRevenue Trend',
    title: 'Monthly Revenue Trend (Last 6 Months)',
    sub: 'Billed vs collected per month',
    defaultType: 'line',
    allowedTypes: ['line','bar'],
    load: async () => {
      const d = await apiFetch('/api/dashboard/monthly-trend');
      return {
        labels: d.map(r => r.month),
        datasets: [
          { label: 'Billed',    data: d.map(r => r.billed)    },
          { label: 'Collected', data: d.map(r => r.collected)  }
        ],
        stats: [
          { val: fmtMoney(d.reduce((s,r)=>s+r.billed,0)),    lbl: 'Total Billed' },
          { val: fmtMoney(d.reduce((s,r)=>s+r.collected,0)), lbl: 'Total Collected' }
        ]
      };
    }
  },
  {
    id: 'collection-trend',
    icon: '📉', label: 'Collection\nRate Trend',
    title: 'Collection Rate Trend (12 Months)',
    sub: 'Month-by-month collection rate %',
    defaultType: 'line',
    allowedTypes: ['line','bar'],
    load: async () => {
      const d = await apiFetch('/api/reports/collection-rate-trend?months=12');
      const avgRate = d.length ? (d.reduce((s,r)=>s+r.collection_rate,0)/d.length).toFixed(1) : 0;
      return {
        labels: d.map(r => r.month),
        datasets: [
          { label: 'Collection Rate %', data: d.map(r => r.collection_rate) },
          { label: 'Leakage Gap (USD)', data: d.map(r => r.leakage_gap),    yAxisID: 'y1' }
        ],
        stats: [
          { val: avgRate + '%',                                   lbl: 'Avg Collection Rate' },
          { val: fmtMoney(d.reduce((s,r)=>s+r.leakage_gap,0)),   lbl: 'Total Leakage Gap' },
          { val: fmtMoney(d.reduce((s,r)=>s+r.collected,0)),     lbl: 'Total Collected' }
        ]
      };
    }
  },
  {
    id: 'budget-variance',
    icon: '🏛', label: 'Budget\nVariance',
    title: 'Budget Variance by Department',
    sub: 'Allocated budget vs actual spending',
    defaultType: 'bar',
    allowedTypes: ['bar','radar'],
    load: async () => {
      const d = await apiFetch('/api/reports/budget-variance');
      const rows = d.variance || d;
      if (!Array.isArray(rows) || rows.length === 0) return { labels: [], datasets: [], stats: [] };
      return {
        labels: rows.map(r => r.department),
        datasets: [
          { label: 'Allocated', data: rows.map(r => r.allocated) },
          { label: 'Spent',     data: rows.map(r => r.actual_spent) }
        ],
        stats: [
          { val: fmtMoney(rows.reduce((s,r)=>s+(r.allocated||0),0)),    lbl: 'Total Budget' },
          { val: fmtMoney(rows.reduce((s,r)=>s+(r.actual_spent||0),0)), lbl: 'Total Spent' }
        ]
      };
    }
  },
  {
    id: 'cashflow-forecast',
    icon: '🔮', label: 'Cashflow\nForecast',
    title: 'Cashflow Forecast (Next 6 Months)',
    sub: 'Projected inflows vs outflows',
    defaultType: 'bar',
    allowedTypes: ['bar','line'],
    load: async () => {
      const d = await apiFetch('/api/reports/cashflow-forecast?months=6');
      const rows = d.forecast || d;
      return {
        labels: rows.map(r => r.month || r.period),
        datasets: [
          { label: 'Expected Receipts', data: rows.map(r => r.expected_receipts)  },
          { label: 'Expected Payments', data: rows.map(r => r.expected_payments)  },
          { label: 'Net Cashflow',      data: rows.map(r => r.net_cashflow)       }
        ],
        stats: [
          { val: fmtMoney(rows.reduce((s,r)=>s+(r.expected_receipts||0),0)), lbl: 'Projected Receipts' },
          { val: fmtMoney(rows.reduce((s,r)=>s+(r.net_cashflow||0),0)),      lbl: 'Net Position' }
        ]
      };
    }
  },
  {
    id: 'officer-performance',
    icon: '👤', label: 'Officer\nPerformance',
    title: 'Revenue Officer Performance',
    sub: 'Collection targets vs actual per officer',
    defaultType: 'bar',
    allowedTypes: ['bar','radar'],
    load: async () => {
      const d = await apiFetch('/api/reports/officer-performance');
      const rows = d.officers || d;
      if (!Array.isArray(rows) || rows.length === 0) return { labels: [], datasets: [], stats: [] };
      return {
        labels: rows.map(r => r.officer),
        datasets: [
          { label: 'Billed',    data: rows.map(r => r.billed)    },
          { label: 'Collected', data: rows.map(r => r.collected)  }
        ],
        stats: [
          { val: rows.length + ' officers', lbl: 'Active Officers' },
          { val: fmtMoney(rows.reduce((s,r)=>s+(r.collected||0),0)), lbl: 'Total Collected' }
        ]
      };
    }
  },
  {
    id: 'leakage-summary',
    icon: '🔴', label: 'Leakage\nAnalysis',
    title: 'Revenue Leakage Analysis',
    sub: 'Alerts by type and severity',
    defaultType: 'doughnut',
    allowedTypes: ['doughnut','pie','bar','polarArea'],
    load: async () => {
      const d = await apiFetch('/api/leakage/summary');
      const bySeverity = d.by_severity || {};
      const byType     = d.by_type     || {};
      const sevLabels  = Object.keys(bySeverity);
      const typeLabels = Object.keys(byType);
      // Primary: severity breakdown
      const labels   = sevLabels.length ? sevLabels : ['No data'];
      const data     = sevLabels.length ? sevLabels.map(k => bySeverity[k]) : [0];
      return {
        labels,
        datasets: [{ label: 'Alerts by Severity', data }],
        stats: [
          { val: d.total_active || 0,    lbl: 'Active Alerts' },
          { val: d.total_resolved || 0,  lbl: 'Resolved' },
          { val: fmtMoney(d.leakage_estimate || 0), lbl: 'Est. Leakage' }
        ]
      };
    }
  },
  {
    id: 'debtors-aging',
    icon: '⏳', label: 'Debtors\nAging',
    title: 'Debtors Aging Analysis (AR)',
    sub: 'Outstanding balances by aging bucket',
    defaultType: 'bar',
    allowedTypes: ['bar','doughnut','pie'],
    load: async () => {
      const d = await apiFetch('/api/aging/debtors');
      const buckets = d.buckets || d.summary || [];
      if (!buckets.length) return { labels: [], datasets: [], stats: [] };
      return {
        labels: buckets.map(b => b.bucket || b.range),
        datasets: [
          { label: 'Amount Outstanding (USD)', data: buckets.map(b => b.amount || b.balance || 0) }
        ],
        stats: [
          { val: d.total_debtors || buckets.length + ' buckets', lbl: 'Debtors' },
          { val: fmtMoney(d.total_outstanding || buckets.reduce((s,b)=>s+(b.amount||0),0)), lbl: 'Total Outstanding' }
        ]
      };
    }
  },
  {
    id: 'revenue-targets-history',
    icon: '📅', label: 'COH Revenue\n2021–2025',
    title: 'City of Harare Historical Revenue (2021–2025)',
    sub: 'Annual receipts from COH official financial dataset',
    defaultType: 'line',
    allowedTypes: ['line','bar'],
    load: async () => {
      const d = await apiFetch('/api/revenue-targets');
      if (!d.length) return {
        labels: [],
        datasets: [],
        stats: [{ val: '0', lbl: 'Load COH data first via Reports → Load COH Data' }]
      };
      const years = [...new Set(d.map(r => r.fiscal_year))].sort();
      const cats  = [...new Set(d.map(r => r.category))];
      const datasets = cats.map(cat => ({
        label: cat.charAt(0).toUpperCase() + cat.slice(1),
        data: years.map(yr => {
          const rec = d.find(r => r.fiscal_year === yr && r.category === cat);
          return rec ? rec.target_amount : 0;
        })
      }));
      const totalByYear = years.map(yr => d.filter(r=>r.fiscal_year===yr).reduce((s,r)=>s+r.target_amount,0));
      return {
        labels: years,
        datasets,
        stats: [
          { val: years.length + ' years', lbl: 'Period' },
          { val: fmtMoney(Math.max(...totalByYear)), lbl: 'Peak Year Revenue' },
          { val: cats.length + ' categories', lbl: 'Revenue Categories' }
        ]
      };
    }
  },
  {
    id: 'financial-summary',
    icon: '📋', label: 'Financial\nSummary',
    title: 'Financial Summary by Category',
    sub: 'Billed, collected and outstanding per revenue category',
    defaultType: 'bar',
    allowedTypes: ['bar','radar','doughnut'],
    load: async () => {
      const d = await apiFetch('/api/reports/financial-summary');
      const rows = d.by_category || d.rows || d;
      if (!Array.isArray(rows) || !rows.length) return { labels: [], datasets: [], stats: [] };
      return {
        labels: rows.map(r => r.category),
        datasets: [
          { label: 'Billed',      data: rows.map(r => r.billed      || 0) },
          { label: 'Collected',   data: rows.map(r => r.collected    || 0) },
          { label: 'Outstanding', data: rows.map(r => r.outstanding  || r.balance || 0) }
        ],
        stats: [
          { val: fmtMoney(rows.reduce((s,r)=>s+(r.billed||0),0)),      lbl: 'Total Billed' },
          { val: fmtMoney(rows.reduce((s,r)=>s+(r.collected||0),0)),   lbl: 'Total Collected' }
        ]
      };
    }
  },
  {
    id: 'invoice-status',
    icon: '📄', label: 'Invoice\nStatus',
    title: 'Invoice Distribution by Status',
    sub: 'Breakdown of invoice statuses across all records',
    defaultType: 'doughnut',
    allowedTypes: ['doughnut','pie','bar','polarArea'],
    load: async () => {
      const d = await apiFetch('/api/invoices?limit=5000');
      const items = d.items || d;
      const statusCount = {};
      const statusAmount = {};
      (items||[]).forEach(inv => {
        statusCount[inv.status]  = (statusCount[inv.status]  || 0) + 1;
        statusAmount[inv.status] = (statusAmount[inv.status] || 0) + (inv.amount || 0);
      });
      const labels = Object.keys(statusCount);
      return {
        labels,
        datasets: [{ label: 'Invoice Count', data: labels.map(s => statusCount[s]) }],
        stats: [
          { val: items.length + ' total', lbl: 'Invoices' },
          { val: fmtMoney(items.reduce((s,i)=>s+(i.amount||0),0)), lbl: 'Total Value' }
        ]
      };
    }
  },
  {
    id: 'payment-methods',
    icon: '💳', label: 'Payment\nMethods',
    title: 'Payment Method Distribution',
    sub: 'How payments are being made (cash, transfer, mobile)',
    defaultType: 'pie',
    allowedTypes: ['pie','doughnut','bar','polarArea'],
    load: async () => {
      const d = await apiFetch('/api/payments?limit=5000');
      const items = d.items || d;
      const methodCount  = {};
      const methodAmount = {};
      (items||[]).forEach(p => {
        const m = p.payment_method || p.method || 'unknown';
        methodCount[m]  = (methodCount[m]  || 0) + 1;
        methodAmount[m] = (methodAmount[m] || 0) + (p.amount || 0);
      });
      const labels = Object.keys(methodCount);
      return {
        labels,
        datasets: [
          { label: 'Count',         data: labels.map(m => methodCount[m])  },
          { label: 'Amount (USD)',  data: labels.map(m => methodAmount[m]) }
        ],
        stats: [
          { val: items.length + ' payments', lbl: 'Total Payments' },
          { val: fmtMoney(items.reduce((s,p)=>s+(p.amount||0),0)), lbl: 'Total Amount' }
        ]
      };
    }
  }
];

// ── Init ──────────────────────────────────────────────────────────────────────
function buildPresets() {
  const grid = document.getElementById('presetGrid');
  grid.innerHTML = PRESETS.map(p => `
    <button class="preset-btn" id="preset-${p.id}" onclick="loadPreset('${p.id}')">
      <span class="preset-icon">${p.icon}</span>
      ${p.label}
    </button>`).join('');
}

function buildSchemes() {
  const grid = document.getElementById('schemeGrid');
  grid.innerHTML = SCHEMES.map((s, i) => `
    <button class="scheme-btn ${i===0?'active':''}" title="${s.name}"
            style="background:${s.swatch}"
            onclick="setScheme(${i},this)"></button>`).join('');
}

buildPresets();
buildSchemes();

// ── Preset loader ─────────────────────────────────────────────────────────────
async function loadPreset(id) {
  const preset = PRESETS.find(p => p.id === id);
  if (!preset) return;
  currentPreset = preset;

  // Highlight active preset
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('preset-' + id)?.classList.add('active');

  // Update type pills visibility
  document.querySelectorAll('.type-pill').forEach(pill => {
    const allowed = preset.allowedTypes || ['bar','line','pie','doughnut','radar','polarArea'];
    pill.style.opacity = allowed.includes(pill.dataset.type) ? '1' : '0.35';
    pill.style.pointerEvents = allowed.includes(pill.dataset.type) ? 'auto' : 'none';
  });

  // Set default type if current type not allowed
  if (!preset.allowedTypes.includes(currentType)) {
    setType(preset.defaultType, document.querySelector(`.type-pill[data-type="${preset.defaultType}"]`));
  }

  currentTitle    = preset.title;
  currentSubtitle = preset.sub;
  document.getElementById('chartTitle').textContent = preset.title;
  document.getElementById('chartSub').textContent   = preset.sub;
  document.getElementById('chartGenAt').textContent = '';

  setLoading(true);
  try {
    currentData = await preset.load();
    renderChart();
    renderStats(currentData.stats || []);
    document.getElementById('chartGenAt').textContent = 'Generated ' + new Date().toLocaleTimeString('en-GB');
    ['btnPNG','btnPDF','btnFull'].forEach(id => document.getElementById(id).disabled = false);
  } catch(e) {
    toast('Failed to load chart data: ' + e.message, 'error');
    setLoading(false);
  }
}

// ── Chart renderer ────────────────────────────────────────────────────────────
function renderChart() {
  if (!currentData) return;
  setLoading(false);

  const canvas = document.getElementById('mainChart');
  const empty  = document.getElementById('chartEmpty');
  canvas.style.display = 'block';
  empty.style.display  = 'none';

  if (currentChart) { currentChart.destroy(); currentChart = null; }

  const scheme  = SCHEMES[currentScheme].colors;
  const smooth  = document.getElementById('optSmooth').checked;
  const legend  = document.getElementById('optLegend').checked;
  const grid    = document.getElementById('optGrid').checked;
  const values  = document.getElementById('optValues').checked;
  const barW    = parseFloat(document.getElementById('optBarWidth').value);
  const isPie   = ['pie','doughnut','polarArea'].includes(currentType);

  const styledDs = currentData.datasets.map((ds, i) => {
    const color = scheme[i % scheme.length];
    const alpha = (hex) => hex + (isPie ? '' : '99');
    return {
      ...ds,
      backgroundColor: isPie
        ? currentData.labels.map((_,li) => scheme[li % scheme.length] + 'cc')
        : alpha(color),
      borderColor: isPie ? scheme.map(c=>c) : color,
      borderWidth: 2,
      tension: smooth ? 0.4 : 0,
      fill: currentType === 'line' ? false : undefined,
      pointBackgroundColor: color,
      pointRadius: currentType === 'line' ? 4 : undefined,
      barPercentage: barW,
      categoryPercentage: 0.8
    };
  });

  const dualAxis = currentData.datasets.some(d => d.yAxisID === 'y1');
  const scales = isPie ? {} : {
    y: {
      beginAtZero: true,
      grid: { color: grid ? 'rgba(255,255,255,.06)' : 'transparent' },
      ticks: { callback: v => currentType === 'radar' ? v : (v >= 1000000 ? '$'+(v/1000000).toFixed(1)+'M' : v >= 1000 ? '$'+(v/1000).toFixed(0)+'K' : (v > 1 ? '$'+v.toLocaleString() : v+'%')) }
    },
    ...(dualAxis ? {
      y1: {
        position: 'right',
        beginAtZero: true,
        grid: { drawOnChartArea: false },
        ticks: { callback: v => '$'+(v/1000).toFixed(0)+'K' }
      }
    } : {})
  };

  const datalabels = values ? {
    display: true,
    formatter: v => typeof v === 'number' ? (v >= 1000 ? '$'+(v/1000).toFixed(0)+'K' : v) : v,
    color: '#fff',
    font: { size: 9, weight: 'bold' },
    anchor: 'end', align: 'top'
  } : { display: false };

  currentChart = new Chart(canvas, {
    type: currentType,
    data: { labels: currentData.labels, datasets: styledDs },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { display: legend, position: 'bottom', labels: { font: { size: 11 }, boxWidth: 12, color: '#8892a4' } },
        tooltip: {
          callbacks: {
            label: ctx => {
              const v = ctx.raw;
              if (typeof v !== 'number') return ` ${ctx.dataset.label}: ${v}`;
              return v > 100 ? ` ${ctx.dataset.label}: $${v.toLocaleString(undefined,{minimumFractionDigits:2})}` : ` ${ctx.dataset.label}: ${v}%`;
            }
          }
        }
      },
      scales,
      cutout: currentType === 'doughnut' ? '55%' : undefined
    }
  });
}

// ── Stats bar ─────────────────────────────────────────────────────────────────
function renderStats(stats) {
  const bar = document.getElementById('statBar');
  if (!stats || !stats.length) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  bar.innerHTML = stats.map(s => `
    <div class="cg-stat">
      <div class="cg-stat-val">${s.val}</div>
      <div class="cg-stat-lbl">${s.lbl}</div>
    </div>`).join('');
}

// ── Type / Scheme setters ─────────────────────────────────────────────────────
function setType(type, btn) {
  currentType = type;
  document.querySelectorAll('.type-pill').forEach(p => p.classList.remove('active'));
  if (btn) btn.classList.add('active');
  if (currentData) renderChart();
}

function setScheme(idx, btn) {
  currentScheme = idx;
  document.querySelectorAll('.scheme-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  if (currentData) renderChart();
}

function redraw() {
  if (currentData) renderChart();
}

// ── Loading state ─────────────────────────────────────────────────────────────
function setLoading(on) {
  document.getElementById('chartLoading').style.display = on ? 'flex' : 'none';
  if (on) {
    document.getElementById('mainChart').style.display = 'none';
    document.getElementById('chartEmpty').style.display = 'none';
  }
}

// ── Fullscreen ────────────────────────────────────────────────────────────────
function openFullscreen() {
  if (!currentData) return;
  const overlay = document.getElementById('fullscreenOverlay');
  document.getElementById('fsTitle').textContent = currentTitle;
  overlay.classList.add('open');

  if (fsChart) { fsChart.destroy(); fsChart = null; }
  const scheme  = SCHEMES[currentScheme].colors;
  const isPie   = ['pie','doughnut','polarArea'].includes(currentType);
  const styledDs = currentData.datasets.map((ds, i) => {
    const color = scheme[i % scheme.length];
    return {
      ...ds,
      backgroundColor: isPie ? currentData.labels.map((_,li) => scheme[li%scheme.length]+'cc') : color+'99',
      borderColor: isPie ? scheme : color,
      borderWidth: 2,
      tension: 0.4,
      pointBackgroundColor: color,
      barPercentage: 0.7
    };
  });
  fsChart = new Chart(document.getElementById('fsChart'), {
    type: currentType,
    data: { labels: currentData.labels, datasets: styledDs },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: true, position: 'bottom', labels: { font: { size: 13 }, boxWidth: 14, color: '#ccc' } }
      },
      scales: isPie ? {} : {
        y: {
          beginAtZero: true,
          grid: { color: 'rgba(255,255,255,.06)' },
          ticks: { color: '#aaa', callback: v => v >= 1000000 ? '$'+(v/1e6).toFixed(1)+'M' : v >= 1000 ? '$'+(v/1000).toFixed(0)+'K' : v }
        }
      },
      cutout: currentType === 'doughnut' ? '55%' : undefined
    }
  });
}

function closeFullscreen() {
  document.getElementById('fullscreenOverlay').classList.remove('open');
  if (fsChart) { fsChart.destroy(); fsChart = null; }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeFullscreen(); });
</script>
