services:
  - type: web
    name: harare-fms
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python database.py && python seed.py && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
