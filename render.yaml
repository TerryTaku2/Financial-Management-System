services:
  - type: web
    name: harare-fms
    runtime: python
    rootDir: backend
    buildCommand: pip install fastapi uvicorn sqlalchemy python-jose python-multipart bcrypt openpyxl
    startCommand: python database.py && python seed.py && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
